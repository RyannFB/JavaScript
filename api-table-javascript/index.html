<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Informações do IP</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">🌐 IP Finder</h1>
                <p class="app-subtitle">Descubra informações sobre qualquer endereço IP ou domínio</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="app-main">
            <div class="search-card">
                <div class="search-header">
                    <h2>Buscar Informações</h2>
                </div>

                <div class="search-container">
                    <div class="search-input-wrapper">
                        <input 
                            type="text" 
                            id="inputIP" 
                            class="search-input" 
                            placeholder="Digite um IP, domínio ou nome do site..."
                            autocomplete="off"
                        >
                        <button id="btnPesquisar" class="search-button">
                            <span class="button-text">Pesquisar</span>
                            <span class="button-icon">→</span>
                        </button>
                    </div>
                    <p class="search-help">Exemplos: 8.8.8.8 | google.com | github</p>
                </div>

                <!-- Loading State -->
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Buscando informações...</p>
                </div>

                <!-- Results -->
                <div id="resultado" class="results-container"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <p>&copy; 2026 IP Finder | Powered by ipinfo.io API</p>
        </footer>
    </div>

    <script src="js/api.js"></script>
</body>
</html>
